name: prototipo
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.2
  geolocator: ^10.1.0
  permission_handler: ^11.3.0
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/acceso.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icono.png"